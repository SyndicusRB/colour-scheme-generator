<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Scheme Generator</title>
    <!-- File Links -->
     <link rel="stylesheet" href="styles.css">
     <script src="index.js" defer></script>
     <!-- Fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="color-header">
        <input type="color" class="input-color" id="input-color">
        <select 
            class="select-color"
            id="select-color"
            size="1"
        >
            <option value="monochrome">Monochrome</option>
            <option value="monochrome-dark">Monochrome-dark</option>
            <option value="monochrome-light">Monochrome-light</option>
            <option value="analogic">Analogic</option>
            <option value="complement">Complement</option>
            <option value="analogic-complement">Analogic-complement</option>
            <option value="triad">Triad</option>
        </select>
        <button class="generate-scheme-btn" id="generate-scheme-btn">Get colour scheme</button>
    </header>

    <section class="grid-colors">
        <div id="grid-color-1"></div>
        <div id="grid-color-2"></div>
        <div id="grid-color-3"></div>
        <div id="grid-color-4"></div>
        <div id="grid-color-5"></div>
    </section>
    
    <section class="grid-hex">
        <div id="grid-hex-1">#FFFFFF</div>
        <div id="grid-hex-2">#FFFFFF</div>
        <div id="grid-hex-3">#FFFFFF</div>
        <div id="grid-hex-4">#FFFFFF</div>
        <div id="grid-hex-5">#FFFFFF</div>
    </section>
    
</body>
</html>
